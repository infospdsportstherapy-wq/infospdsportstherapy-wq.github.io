version: '3.8'

services:
  # PHP Apache Web Server
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spd-php
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME:-spd_sports_therapy}
      - DB_USER=${DB_USER:-spd_user}
      - DB_PASSWORD=${DB_PASSWORD:-dev_password_123}
      - SITE_URL=${SITE_URL:-http://localhost:8000}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - spd-network
    restart: unless-stopped

  # MySQL Database Server
  mysql:
    image: mysql:8.0
    container_name: spd-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password_secure_123
      MYSQL_DATABASE: ${DB_NAME:-spd_sports_therapy}
      MYSQL_USER: ${DB_USER:-spd_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dev_password_123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sh:/docker-entrypoint-initdb.d/01-init.sh
      - ./database/database.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks:
      - spd-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      interval: 10s
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  spd-network:
    driver: bridge
